/* ============================================================================
   5) TRACKING  (works with GoatCounter / GA4 if loaded; no-ops otherwise)
   ============================================================================ */
function track(name){
  try{
    if(window.goatcounter && window.goatcounter.count){
      window.goatcounter.count({path:"event/"+name, title:name, event:true});
    }
    if(typeof gtag==="function"){ gtag("event", name); }
  }catch(e){}
}

/* ============================================================================
   6) APP LOGIC
   ============================================================================ */
const state = { lang:"en", step:0, answers:[], picked:[], mode:"cook", view:"quiz" };
let lastDish = null;
const panel = document.getElementById("panel");
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function L(o){return o[state.lang];}

function newQuiz(){
  state.step=0; state.answers=[]; state.mode="cook"; state.view="quiz";
  state.picked=shuffle(QUESTIONS).slice(0,3);
  renderQuestion();
}
function renderQuestion(){
  state.view="quiz";
  const Q=state.picked[state.step];
  const dots=state.picked.map((_,i)=>{const c=i<state.step?"done":(i===state.step?"now":"");return '<span class="'+c+'"></span>';}).join("");
  const opts=Q.options.map((o,i)=>{
    const cls="opt"+(Q.kind==="ox"?" ox":"");
    const txt=Q.kind==="ox"?o.ox:L(o.label);
    const sub=Q.kind==="ox"?'<div style="font-size:12px;font-weight:500;color:var(--ink-2);margin-top:4px">'+L(o.label)+'</div>':"";
    return '<button class="'+cls+'" data-i="'+i+'">'+txt+sub+'</button>';
  }).join("");
  panel.innerHTML='<div class="dots">'+dots+'</div>'+
    '<div class="step-label">'+L(STR.stepLabel)+' '+(state.step+1)+' / 3</div>'+
    '<div class="question">'+L(Q.q)+'</div>'+
    '<div class="options">'+opts+'</div>'+
    (state.step>0?'<button class="back" id="back">'+L(STR.back)+'</button>':"");
  panel.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>answer(+b.dataset.i)));
  const back=document.getElementById("back");
  if(back) back.addEventListener("click",()=>{state.step--;state.answers.pop();renderQuestion();});
}
function answer(i){
  const Q=state.picked[state.step]; const opt=Q.options[i];
  state.answers.push({q:Q,opt});
  if(opt.mode==="order") state.mode="order";
  track("answer-"+Q.id);
  if(state.step<2){state.step++;renderQuestion();}
  else{showResult(computeResult());}
}
function computeResult(){
  let pool=DISHES.slice();
  state.answers.forEach(({opt})=>{const n=pool.filter(opt.filter);if(n.length)pool=n;});
  return pool[Math.floor(Math.random()*pool.length)];
}
function buildLinks(dish){
  const order=state.mode==="order";
  if(state.lang==="en"){
    const q=encodeURIComponent(dish.shop.en.query);
    const amazon=AFFILIATE.amazonHost+"?k="+q+"&tag="+AFFILIATE.amazonTag;
    return [{retailer:"Amazon",url:amazon}];
  } else {
    const q=encodeURIComponent(dish.shop.ko.naver);
    const naver=AFFILIATE.naverSearch+"?query="+q;
    const coupang=dish.shop.ko.coupangUrl?dish.shop.ko.coupangUrl:AFFILIATE.coupangPartners;
    if(order) return [{retailer:"쿠팡이츠",url:AFFILIATE.coupangEats,order:true},{retailer:"네이버",url:naver}];
    return [{retailer:"쿠팡",url:coupang},{retailer:"네이버",url:naver}];
  }
}
function showResult(dish){
  lastDish=dish; state.view="result";
  const chips=state.answers.map(({q,opt})=>'<span class="chip">'+L(opt.label)+'</span>').join("");
  const links=buildLinks(dish).map(l=>{
    const label=(l.order&&l.retailer==="쿠팡이츠")?L(STR.goOrder):L(STR.go);
    return '<a class="shop-link" href="'+l.url+'" target="_blank" rel="nofollow sponsored noopener" data-shop="'+l.retailer+'" data-dish="'+dish.id+'">'+
           '<span>'+l.retailer+'</span><span class="go">'+label+'</span></a>';
  }).join("");
  panel.innerHTML='<div class="reveal"><div class="dish-emoji">'+dish.emoji+'</div>'+
    '<div class="result-kicker">'+L(STR.resultKicker)+'</div>'+
    '<div class="dish-name">'+L(dish.name)+'</div>'+
    '<div class="dish-desc">'+L(dish.desc)+'</div>'+
    '<div class="chips">'+chips+'</div>'+
    '<div class="shop"><div class="shop-title">'+(state.mode==="order"?L(STR.shopOrder):L(STR.shopCook))+'</div>'+
    '<div class="shop-links">'+links+'</div>'+
    '<div class="aff-note">'+L(STR.affNote)+'</div></div>'+
    '<div class="result-actions"><button class="btn-ghost" id="again">'+L(STR.again)+'</button>'+
    '<button class="btn-ghost" id="restart">'+L(STR.restart)+'</button></div></div>';
  panel.querySelectorAll(".shop-link").forEach(a=>a.addEventListener("click",()=>track("shop-"+a.dataset.shop+"-"+a.dataset.dish)));
  document.getElementById("again").addEventListener("click",()=>{track("again");showResult(computeResult());});
  document.getElementById("restart").addEventListener("click",()=>{track("restart");newQuiz();});
}
function surprise(){state.mode="cook";state.answers=[];track("surprise");showResult(DISHES[Math.floor(Math.random()*DISHES.length)]);}
function setLang(lang){
  state.lang=lang; document.documentElement.lang=lang;
  document.getElementById("lang-en").setAttribute("aria-pressed",lang==="en");
  document.getElementById("lang-ko").setAttribute("aria-pressed",lang==="ko");
  document.querySelectorAll("[data-t]").forEach(el=>{const k=el.getAttribute("data-t");if(STR[k])el.textContent=L(STR[k]);});
  if(state.view==="result"&&lastDish)showResult(lastDish); else renderQuestion();
}
document.getElementById("lang-en").addEventListener("click",()=>setLang("en"));
document.getElementById("lang-ko").addEventListener("click",()=>setLang("ko"));
document.getElementById("surprise").addEventListener("click",surprise);
